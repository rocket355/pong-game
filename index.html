<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>PONG</h1>
        <div class="scoreboard">
            <div class="score-container">
                <span class="score-label">Player</span>
                <span class="score" id="playerScore">0</span>
            </div>
            <div class="score-container">
                <span class="score-label">Computer</span>
                <span class="score" id="computerScore">0</span>
            </div>
        </div>
        
        <div class="game-board" id="gameBoard">
            <!-- Left paddle (Player) -->
            <div class="paddle player-paddle" id="playerPaddle"></div>
            
            <!-- Right paddle (Computer) -->
            <div class="paddle computer-paddle" id="computerPaddle"></div>
            
            <!-- Ball -->
            <div class="ball" id="ball"></div>
            
            <!-- Center line -->
            <div class="center-line"></div>
        </div>
        
        <div class="controls">
            <p>Controls: <strong>Mouse Y-axis</strong> or <strong>Arrow Keys (↑/↓)</strong></p>
            <p id="gameStatus">Game Running...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
